<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block subject %}Community Shelf{% endblock %}</title>
<style>
  /* Reset */
  body, table, td, p, a, li { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
  body { margin: 0; padding: 0; width: 100% !important; background-color: #f3ede4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  table { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
  img { border: 0; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }

  /* Layout */
  .wrapper { width: 100%; background-color: #f3ede4; padding: 32px 0; }
  .container { max-width: 560px; margin: 0 auto; }

  /* Header */
  .header { background-color: #0d7377; border-radius: 12px 12px 0 0; padding: 24px 32px; text-align: center; }
  .header-title { color: #ffffff; font-size: 20px; font-weight: 700; letter-spacing: 0.02em; margin: 0; }
  .header-subtitle { color: rgba(255, 255, 255, 0.7); font-size: 12px; font-weight: 500; margin: 4px 0 0 0; letter-spacing: 0.04em; text-transform: uppercase; }

  /* Body */
  .body { background-color: #ffffff; padding: 32px; }
  .body h2 { color: #074e52; font-size: 18px; font-weight: 700; margin: 0 0 8px 0; }
  .body p { color: #6b7280; font-size: 14px; line-height: 1.6; margin: 0 0 16px 0; }

  /* Details table */
  .details { width: 100%; margin: 20px 0; border: 1px solid #e5e0d8; border-radius: 8px; overflow: hidden; }
  .details td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid #f3ede4; }
  .details tr:last-child td { border-bottom: none; }
  .details .label { color: #9ca3af; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; width: 120px; background-color: #faf8f5; }
  .details .value { color: #374151; }

  /* CTA button */
  .cta { display: inline-block; background-color: #0d7377; color: #ffffff !important; font-size: 14px; font-weight: 600; text-decoration: none; padding: 12px 28px; border-radius: 8px; margin: 8px 0; }

  /* Footer */
  .footer { background-color: #faf8f5; border-radius: 0 0 12px 12px; padding: 20px 32px; text-align: center; border-top: 1px solid #e5e0d8; }
  .footer p { color: #9ca3af; font-size: 12px; margin: 0; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrapper">
  <table class="container" role="presentation" cellpadding="0" cellspacing="0" width="560" align="center">
    <!-- Header -->
    <tr>
      <td class="header">
        <p class="header-title">Community Shelf</p>
        <p class="header-subtitle">{% block header_subtitle %}Notification{% endblock %}</p>
      </td>
    </tr>

    <!-- Body -->
    <tr>
      <td class="body">
        {% block content %}{% endblock %}
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td class="footer">
        <p>This is an automated notification from Community Shelf.</p>
        {% block footer_extra %}{% endblock %}
      </td>
    </tr>
  </table>
</div>
</body>
</html>
